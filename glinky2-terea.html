<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VARUS Глинки 2 — Terea замовлення (замовлено vs доставлено)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--bg:#f5f5f4;--card:#fff;--border:#e5e7eb;--text:#1A1A2E;--muted:#6b7280;--green:#1a6b43;--red:#dc2626;--yellow:#ca8a04;--accent:#1a6b43}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,system-ui,sans-serif;line-height:1.5;padding:0 0 60px}
.wrap{max-width:1240px;margin:0 auto;padding:24px}
.header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:18px;border-bottom:2px solid var(--border)}
.logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#34D186,#1A1A2E);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
h1{font-size:20px;font-weight:700}
.sub{font-size:12px;color:var(--muted);margin-top:2px}
.toolbar{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-pdf{background:#1A1A2E;color:#fff}
.btn-csv{background:var(--accent);color:#fff}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center}
.kpi .l{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:5px}
.kpi .v{font-size:24px;font-weight:700}
.controls{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.controls input{flex:1;min-width:180px;max-width:280px;padding:8px 12px;font-size:13px;border:1px solid var(--border);border-radius:7px;outline:none}
.fbtn{padding:7px 13px;font-size:12px;font-weight:600;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--muted);cursor:pointer}
.fbtn.on{background:#1A1A2E;color:#fff;border-color:#1A1A2E}
.count{margin-left:auto;font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;font-size:12.5px}
th{text-align:left;padding:10px 12px;background:#faf9f7;border-bottom:2px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);position:sticky;top:0}
td{padding:10px 12px;border-bottom:1px solid #f3f4f6;vertical-align:top}
tr:hover td{background:#fafaf9}
.oid{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.oid .d{font-weight:400;color:var(--muted);font-size:11px}
ul{list-style:none;margin:0}
li{padding:2px 0 2px 14px;position:relative}
li::before{content:"•";position:absolute;left:0;color:var(--muted)}
li.terea::before{content:"▪";color:#b45309}
li.nd{color:var(--red)}
li.nd::before{content:"✕";color:var(--red)}
li.rep{color:var(--yellow)}
li.rep::before{content:"↻";color:var(--yellow)}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap}
.b-dlv{background:#dcfce7;color:#166534}
.b-fail{background:#fee2e2;color:#991b1b}
.b-gap{background:#fef9c3;color:#854d0e;margin-top:4px}
.b-bulk{background:#ede9fe;color:#5b21b6;margin-top:4px}
.legend{font-size:11px;color:var(--muted);margin:10px 2px;display:flex;gap:16px;flex-wrap:wrap}
@media print{body{background:#fff}.toolbar,.controls{display:none}th{position:static}}
</style>
</head>

<div class="wrap" id="report">
  <div class="header">
    <div class="logo">V</div>
    <div>
      <h1>VARUS · Глинки 2 — замовлення з Terea</h1>
      <div class="sub">Дніпро · тиждень 15–21.06.2026 · замовлено vs доставлено (джерело: Databricks dim_basket_item_delivery)</div>
    </div>
    <div class="toolbar">
      <button class="btn btn-csv" onclick="downloadCSV()">⬇ CSV</button>
      <button class="btn btn-pdf" onclick="downloadPDF()">⬇ PDF</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="controls">
    <input id="q" placeholder="Пошук: order_id або товар…" oninput="render()">
    <button class="fbtn on" data-f="all" onclick="setF(this)">Усі</button>
    <button class="fbtn" data-f="delivered" onclick="setF(this)">Delivered</button>
    <button class="fbtn" data-f="failed" onclick="setF(this)">Failed</button>
    <button class="fbtn" data-f="gap" onclick="setF(this)">З розбіжністю</button>
    <span class="count" id="count"></span>
  </div>
  <div class="legend">
    <span>▪ Terea</span><span style="color:var(--red)">✕ замовлено, не доставлено</span>
    <span style="color:var(--yellow)">↻ заміна</span><span>badge «bulk» = 10+ стіків в одному замовленні</span>
  </div>

  <table>
    <thead><tr><th style="width:110px">Замовлення</th><th style="width:70px">Статус</th><th>Замовлено</th><th>Доставлено</th></tr></thead>
    <tbody id="tb"></tbody>
  </table>
</div>

let filter='all';
const AGE='Мені більше 18';

function isTerea(s){return /terea/i.test(s)}
function bulkQty(o){ // max Terea qty in order
  let m=0;
  o.ord.forEach(s=>{if(isTerea(s)){const q=parseInt((s.match(/x(\d+)/)||[])[1]||0);if(q>m)m=q}});
  return m;
}
function cleanList(arr,cls){
  const items=arr.filter(s=>!s.startsWith(AGE));
  if(!items.length)return '<span style="color:var(--muted)">—</span>';
  return '<ul>'+items.map(s=>{
    let c=cls||'';if(isTerea(s))c+=' terea';
    return `<li class="${c.trim()}">${s}</li>`;
  }).join('')+'</ul>';
}
function ndRepList(o){
  let h='';
  if(o.nd.length)h+='<ul>'+o.nd.filter(s=>!s.startsWith(AGE)).map(s=>`<li class="nd">${s}</li>`).join('')+'</ul>';
  if(o.rep.length)h+='<ul>'+o.rep.filter(s=>!s.startsWith(AGE)).map(s=>`<li class="rep">${s}</li>`).join('')+'</ul>';
  return h;
}

function pass(o){
  const q=document.getElementById('q').value.toLowerCase().trim();
  if(filter==='delivered'&&o.st!=='delivered')return false;
  if(filter==='failed'&&o.st!=='failed')return false;
  if(filter==='gap'&&!(o.nd.length||o.rep.length||o.full==='N'))return false;
  if(q){
    const hay=(o.id+' '+o.ord.join(' ')+' '+o.dlv.join(' ')).toLowerCase();
    if(!hay.includes(q))return false;
  }
  return true;
}

function render(){
  const rows=DATA.filter(pass);
  document.getElementById('tb').innerHTML=rows.map(o=>{
    const bulk=bulkQty(o);
    const stBadge=o.st==='delivered'?'<span class="badge b-dlv">delivered</span>':'<span class="badge b-fail">failed</span>';
    const gap=(o.nd.length||o.rep.length)?'<br><span class="badge b-gap">розбіжність</span>':'';
    const bulkB=bulk>=10?`<br><span class="badge b-bulk">bulk ${bulk}×</span>`:'';
    return `<tr>
      <td class="oid">${o.id}<br><span class="d">${o.date}</span></td>
      <td>${stBadge}${gap}${bulkB}</td>
      <td>${cleanList(o.ord)}</td>
      <td>${cleanList(o.dlv)}${ndRepList(o)}</td>
    </tr>`;
  }).join('');
  document.getElementById('count').textContent=`Показано: ${rows.length} з ${DATA.length}`;
}

function setF(btn){
  filter=btn.dataset.f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('on',b===btn));
  render();
}

function kpis(){
  const n=DATA.length, d=DATA.filter(o=>o.st==='delivered').length;
  const gap=DATA.filter(o=>o.nd.length||o.rep.length).length;
  const bulk=DATA.filter(o=>bulkQty(o)>=10).length;
  let sticks=0;DATA.forEach(o=>{if(o.st==='delivered')o.dlv.forEach(s=>{if(isTerea(s))sticks+=parseInt((s.match(/x(\d+)/)||[])[1]||0)})});
  const cards=[['Замовлень',n],['Delivered',d],['Failed',n-d],['Доставлено стіків Terea',sticks],['Bulk 10+',bulk]];
  document.getElementById('kpis').innerHTML=cards.map(c=>`<div class="kpi"><div class="l">${c[0]}</div><div class="v">${c[1]}</div></div>`).join('');
}

function downloadCSV(){
  const rows=DATA.filter(pass);
  const esc=s=>'"'+String(s).replace(/"/g,'""')+'"';
  const head=['order_id','date','status','fully_delivered','ordered_items','delivered_items','not_delivered','replacements'];
  const lines=[head.join(',')];
  rows.forEach(o=>lines.push([o.id,o.date,o.st,o.full,
    o.ord.filter(s=>!s.startsWith(AGE)).join('; '),
    o.dlv.filter(s=>!s.startsWith(AGE)).join('; '),
    o.nd.join('; '),o.rep.join('; ')].map(esc).join(',')));
  const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='VARUS_Glinky2_Terea_orders.csv';a.click();
}
function downloadPDF(){
  html2pdf().set({margin:[6,6,6,6],filename:'VARUS_Glinky2_Terea_orders.pdf',
    image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,backgroundColor:'#fff'},
    jsPDF:{unit:'mm',format:'a4',orientation:'landscape'},
    pagebreak:{mode:['css','legacy'],avoid:'tr'}}).from(document.getElementById('report')).save();
}
