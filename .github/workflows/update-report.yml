# Цей файл копіюється в:
#  1) Reports/<Partner>/.github/workflows/update-report.yml (для відстеження локально)
#  2) <partner>-report публічний репо: .github/workflows/update-report.yml
#
# Запускається щопонеділка о 05:00 UTC (=08:00 Київ) — або вручну через Actions UI.
# Тягне свіжі дані з Databricks і пушить новий index.html.

name: Оновлення звіту VARUS

on:
  schedule:
    - cron: '0 5 * * 1'  # Понеділок 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and generate report
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
        run: python generate_report.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Щотижневе оновлення: $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
