let filter='all';
const AGE='Мені більше 18';
const RE_TOBACCO=/тютюн|стіки|terea|kent|iqos|heets|\bglo\b|сигарет|цигарк|marlboro|parliament|winston|rothmans|lucky strike|l&м|l&m|sobranie|chesterfield|camel|philip morris/i;
const RE_ALCO=/пиво|сидр|горілк|вино|напій алкогол|shake|ігрист|віскі|коньяк|лікер|пивний|\bель\b|портер|вермут|бренді|\bром\b|джин|текіл|сангрі|глінтвейн|аперол|мартіні/i;

function isOver(it){return it.st==='active'&&!it.repl&&it.ord>=1&&it.dlv>it.ord}
function orderExtra(o){return o.items.filter(isOver).reduce((s,it)=>s+(it.dlv-it.ord),0)}
function orderHasUnit(o){return o.items.some(it=>isOver(it)&&!it.w)}
function orderHasWeighted(o){return o.items.some(it=>isOver(it)&&it.w)}
function orderHasAlco(o){return o.items.some(it=>isOver(it)&&RE_ALCO.test(it.name))}
function orderHasTobacco(o){return o.items.some(it=>isOver(it)&&RE_TOBACCO.test(it.name))}

function pass(o){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const city=document.getElementById('city').value;
  if(city&&o.city!==city)return false;
  if(filter==='unit'&&!orderHasUnit(o))return false;
  if(filter==='weighted'&&!orderHasWeighted(o))return false;
  if(filter==='alco'&&!orderHasAlco(o))return false;
  if(filter==='tobacco'&&!orderHasTobacco(o))return false;
  if(q){
    const hay=(o.id+' '+o.store+' '+o.city+' '+o.items.map(i=>i.name).join(' ')).toLowerCase();
    if(!hay.includes(q))return false;
  }
  return true;
}

function itemLi(it){
  if(it.name.startsWith(AGE))return '';
  const over=isOver(it);
  const cls=over?'over':(it.dlv!==it.ord?'':'dim');
  const tag=over?`<span class="tag ${it.w?'tag-w':'tag-u'}">${it.w?'ваг':'шт'}</span>`:'';
  const q=over?`${it.ord} → ${it.dlv} (+${(it.dlv-it.ord)})`:`${it.ord}${it.dlv!==it.ord?' → '+it.dlv:''}`;
  return `<li class="${cls}"><span class="nm">${it.name}${tag}</span><span class="q">${q}</span></li>`;
}

function render(){
  const rows=DATA.filter(pass);
  document.getElementById('tb').innerHTML=rows.map(o=>{
    const extra=orderExtra(o);
    // show over items first, then rest
    const over=o.items.filter(isOver);
    const rest=o.items.filter(it=>!isOver(it));
    const lis=over.map(itemLi).join('')+rest.map(itemLi).join('');
    return `<tr>
      <td class="oid">${o.id}<br><span class="d">${o.date}</span><br><span class="badge b-extra">+${extra} шт</span></td>
      <td class="store">${o.store}<br><span class="c">${o.city}</span></td>
      <td><ul>${lis}</ul></td>
    </tr>`;
  }).join('');
  document.getElementById('count').textContent=`Показано: ${rows.length} з ${DATA.length}`;
}
function setF(btn){filter=btn.dataset.f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('on',b===btn));render();}

function kpis(){
  const n=DATA.length;
  let extra=0,unit=0,weighted=0,alco=0,tob=0;
  DATA.forEach(o=>{o.items.forEach(it=>{if(isOver(it)){extra+=it.dlv-it.ord;if(it.w)weighted++;else unit++;if(RE_TOBACCO.test(it.name))tob++;else if(RE_ALCO.test(it.name))alco++;}})});
  const cards=[['Замовлень',n],['Зайвих одиниць',extra],['Алко позицій',alco],['Тютюн позицій',tob],['Інші штучні',unit-alco-tob]];
  document.getElementById('kpis').innerHTML=cards.map(c=>`<div class="kpi"><div class="l">${c[0]}</div><div class="v">${c[1]}</div></div>`).join('');
  const cities=[...new Set(DATA.map(o=>o.city))].sort();
  document.getElementById('city').innerHTML='<option value="">Усі міста</option>'+cities.map(c=>`<option>${c}</option>`).join('');
}

  const esc=s=>'"'+String(s).replace(/"/g,'""')+'"';
  const head=['order_id','date','city','store','item','ordered','delivered','extra','type'];
  const lines=[head.join(',')];
  rows.forEach(o=>o.items.filter(isOver).forEach(it=>lines.push(
    [o.id,o.date,o.city,o.store,it.name,it.ord,it.dlv,it.dlv-it.ord,it.w?'ваговий':'штучний'].map(esc).join(','))));
  const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='VARUS_June_over_delivered.csv';a.click();
}
function downloadPDF(){
  html2pdf().set({margin:[6,6,6,6],filename:'VARUS_June_over_delivered.pdf',
    image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,backgroundColor:'#fff'},
    jsPDF:{unit:'mm',format:'a4',orientation:'landscape'},
    pagebreak:{mode:['css','legacy'],avoid:'tr'}}).from(document.getElementById('report')).save();
}
kpis();render();
</script>
